# Dex — local OIDC provider
#
# Seed users (all password: "password"):
#   admin@local          groups: qe-admins, pii-approved, qe-adhoc
#   analyst-pii@local    groups: qe-editors, pii-approved, qe-adhoc
#   analyst@local        groups: qe-editors         (no PII, no ad-hoc)
#   viewer@local         groups: qe-viewers         (saved queries only, no PII)
#
# Password hashes below are bcrypt of "password".

apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: quintus
data:
  config.yaml: |
    issuer: http://dex.local.test:8080
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    oauth2:
      skipApprovalScreen: true
    staticClients:
      - id: queryexplorer
        name: queryexplorer
        secret: dev-client-secret-not-for-prod
        redirectURIs:
          - http://queryexplorer.local.test:8080/oauth2/callback
    enablePasswordDB: true
    staticPasswords:
      - email: admin@local
        hash: "$2a$12$HCxY9Yq1lPuv8YSc9fjsTeDvN3l0VlbsgcrkqTeMnb7CzsjIelSge"
        username: admin
        userID: "1"
      - email: analyst-pii@local
        hash: "$2a$10$2b2cu2a5yuyvhjY9RfYpbeJfARaNHDWKh5wmgNHBAQfT1w2xQ6S2."
        username: analyst-pii
        userID: "2"
      - email: analyst@local
        hash: "$2a$10$2b2cu2a5yuyvhjY9RfYpbeJfARaNHDWKh5wmgNHBAQfT1w2xQ6S2."
        username: analyst
        userID: "3"
      - email: viewer@local
        hash: "$2a$10$2b2cu2a5yuyvhjY9RfYpbeJfARaNHDWKh5wmgNHBAQfT1w2xQ6S2."
        username: viewer
        userID: "4"

    # Dex's static password connector does not emit groups on its own.
    # For local dev the simplest path is to bake groups into the ID token
    # via a custom claim. Dex does not support this directly from config,
    # so in M9 you have two options:
    #   1. Swap to the "mockCallback" connector with hard-coded groups
    #   2. Run a tiny sidecar that intercepts the token endpoint and
    #      augments the ID token
    # For scaffolding purposes we leave groups out here; oauth2-proxy will
    # synthesize them from a static map keyed by email until replaced.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: quintus
spec:
  replicas: 1
  selector:
    matchLabels: {app: dex}
  template:
    metadata:
      labels: {app: dex}
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command: [/usr/local/bin/dex, serve, /etc/dex/config.yaml]
          ports:
            - containerPort: 5556
          volumeMounts:
            - name: config
              mountPath: /etc/dex
      volumes:
        - name: config
          configMap: {name: dex-config}
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: quintus
spec:
  selector: {app: dex}
  ports:
    - port: 5556
      targetPort: 5556
