apiVersion: v1
data:
  config.yaml: |
    issuer: http://dex.quintus.svc.cluster.local:5556/dex

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    enablePasswordDB: true

    staticPasswords:
      - email: admin@example.com
        hash: "$2a$12$HCxY9Yq1lPuv8YSc9fjsTeDvN3l0VlbsgcrkqTeMnb7CzsjIelSge"
        username: admin
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"

    staticClients:
      - id: oauth2-proxy
        name: oauth2-proxy
        secret: proxy-secret
        redirectURIs:
          - http://127.0.0.1:18080/oauth2/callback
