# Traefik middlewares and routing for QueryExplorer
#
# Order of middlewares on the protected route:
#   1. strip-inbound-headers    Prevents clients from spoofing X-User-* / proxy secret
#   2. forward-auth             Calls oauth2-proxy; on 401 redirects to login
#   3. inject-proxy-secret      Adds X-Auth-Proxy-Secret only after auth passes
#
# The oauth2 callback and sign-out routes bypass forward-auth (they ARE the auth).

---
# Strip any X-User-* and X-Auth-Proxy-Secret set by a client before anything else.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-inbound-headers
  namespace: quintus
spec:
  headers:
    customRequestHeaders:
      X-Auth-Request-User: ""
      X-Auth-Request-Email: ""
      X-Auth-Request-Preferred-Username: ""
      X-Auth-Request-Groups: ""
      X-Auth-Proxy-Secret: ""

---
# Forward-auth: Traefik calls /oauth2/auth on oauth2-proxy.
# If authenticated, oauth2-proxy returns 202 with X-Auth-Request-* headers
# which we propagate to the backend.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: quintus
spec:
  forwardAuth:
    address: http://oauth2-proxy.quintus.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Groups

---
# After auth succeeds, add the shared secret so the backend knows the
# request genuinely came through Traefik.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: inject-proxy-secret
  namespace: quintus
spec:
  headers:
    customRequestHeaders:
      X-Auth-Proxy-Secret: "dev-proxy-secret-change-me"

---
# Redirect unauthenticated requests to oauth2-proxy's /oauth2/start endpoint.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: auth-error-redirect
  namespace: quintus
spec:
  errors:
    status:
      - "401-403"
    statusRewrites:
      "401": 302
      "403": 302
    service:
      name: oauth2-proxy
      port: 4180
    query: "/oauth2/start?rd={url}"

---
# Main app route — full middleware chain.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: queryexplorer
  namespace: quintus
spec:
  entryPoints: [web]
  routes:
    - match: Host(`queryexplorer.local.test`) && !PathPrefix(`/oauth2`)
      kind: Rule
      services:
        - name: queryexplorer
          port: 80
      middlewares:
        - name: strip-inbound-headers
        - name: forward-auth
        # - name: auth-error-redirect
        - name: inject-proxy-secret

---
# oauth2-proxy routes (login, callback, sign-out) — no auth middleware on these.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy
  namespace: quintus
spec:
  entryPoints: [web]
  routes:
    - match: Host(`queryexplorer.local.test`) && PathPrefix(`/oauth2/`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dex
  namespace: quintus
spec:
  entryPoints: [web]
  routes:
    - match: Host(`dex.local.test`)
      kind: Rule
      services:
        - name: dex
          port: 5556
