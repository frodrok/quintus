# oauth2-proxy — used by Traefik ForwardAuth to handle the OIDC dance
# and inject identity headers into backend requests.

apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: quintus
type: Opaque
stringData:
  # 32-byte random for the cookie; regenerate for real envs
  cookie-secret: "8BB3715EBD83C609514644152E2BB11A"
  client-secret: "dev-client-secret-not-for-prod"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: quintus
spec:
  replicas: 1
  selector:
    matchLabels: {app: oauth2-proxy}
  template:
    metadata:
      labels: {app: oauth2-proxy}
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=http://dex.quintus.svc.cluster.local:5556
            - --login-url=http://dex.quintus.svc.cluster.local:5556/auth
            - --redeem-url=http://dex.quintus.svc.cluster.local:5556/token
            - --oidc-jwks-url=http://dex.quintus.svc.cluster.local:5556/keys
            - --client-id=queryexplorer
            - --client-secret=dev-client-secret-not-for-prod
            - --redirect-url=http://queryexplorer.local.test/oauth2/callback

            - --email-domain=*
            - --scope=openid profile email groups

            - --cookie-secret=8BB3715EBD83C609514644152E2BB11A
            - --cookie-secure=false
            - --cookie-domain=.queryexplorer.local.test

            - --http-address=0.0.0.0:4180

            # IMPORTANT: enables browser login flow
            - --proxy-prefix=/oauth2

            # IMPORTANT: makes oauth2-proxy act as auth gateway
            - --upstream=http://127.0.0.1:4180   # or empty auth-only mode depending config

            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --reverse-proxy=true
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: {secretKeyRef: {name: oauth2-proxy, key: cookie-secret}}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: {secretKeyRef: {name: oauth2-proxy, key: client-secret}}
          ports:
            - containerPort: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: quintus
spec:
  selector: {app: oauth2-proxy}
  ports:
    - port: 4180
      targetPort: 4180
