# App database for QueryExplorer. Target databases (the ones users query)
# are configured at runtime via the connections UI.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: quintus
type: Opaque
stringData:
  POSTGRES_DB: queryexplorer
  POSTGRES_USER: queryexplorer
  POSTGRES_PASSWORD: dev-only-not-for-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: quintus
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: quintus
spec:
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          envFrom:
            - secretRef: {name: postgres-credentials}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec: {command: [pg_isready, -U, queryexplorer]}
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: postgres-data}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: quintus
spec:
  selector: {app: postgres}
  ports:
    - port: 5432
      targetPort: 5432
