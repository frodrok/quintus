apiVersion: v1
kind: Secret
metadata:
  name: queryexplorer-secrets
  namespace: quintus
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  QE_PROXY_SHARED_SECRET: "dev-proxy-secret-change-me"
  # Generate with: openssl rand -base64 32
  QE_DSN_ENCRYPTION_KEY: "ZGV2LWtleS0zMi1ieXRlcy1hYWFhYWFhYWFhYWFhYWE="
  QE_DB_DSN: "postgres://queryexplorer:dev-only-not-for-prod@postgres.quintus.svc.cluster.local:5432/queryexplorer?sslmode=disable"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: queryexplorer-config
  namespace: quintus
data:
  QE_HTTP_ADDR: ":8080"
  QE_HEADER_SUB: "X-Auth-Request-User"
  QE_HEADER_EMAIL: "X-Auth-Request-Email"
  QE_HEADER_NAME: "X-Auth-Request-Preferred-Username"
  QE_HEADER_GROUPS: "X-Auth-Request-Groups"
  QE_GROUP_SEPARATOR: ","
  QE_ROLE_MAPPING: "admin:qe-admins,editor:qe-editors,viewer:qe-viewers"
  QE_PII_GROUPS: "pii-approved,pii-support-partial"
  QE_ADHOC_GROUPS: "qe-adhoc"
  QE_LOGOUT_URL: "http://queryexplorer.local.test:8080/oauth2/sign_out?rd=%2F"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryexplorer
  namespace: quintus
spec:
  replicas: 1
  selector:
    matchLabels: {app: queryexplorer}
  template:
    metadata:
      labels: {app: queryexplorer}
    spec:
      containers:
        - name: queryexplorer
          image: queryexplorer:dev1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: {name: queryexplorer-config}
            - secretRef: {name: queryexplorer-secrets}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: queryexplorer
  namespace: quintus
spec:
  selector: {app: queryexplorer}
  ports:
    - port: 80
      targetPort: 8080
